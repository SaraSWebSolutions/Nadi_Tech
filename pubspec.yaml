name: tech_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  go_router: ^17.0.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  shared_preferences: ^2.5.4
  flutter_riverpod: ^3.1.0
  intl: ^0.20.2
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^2.0.1
  flutter_staggered_animations: ^1.1.1
  audioplayers: ^6.5.1
  record: ^6.1.2
  path_provider: ^2.1.4
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.5.0
  connectivity_plus: ^7.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  stream_chat_flutter: ^9.23.0
  mqtt_client: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# ---------------- LAUNCHER ICON ----------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/Techlogo.png"

# ---------------- NATIVE SPLASH ----------------
flutter_native_splash:
  color: "#6473B7"
  image: assets/logo/Techlogo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#6473B7"
    image: assets/logo/Techlogo.png

flutter:
  generate: true
  uses-material-design: true

  # ---------------- ASSETS ----------------
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

  # ---------------- FONTS ----------------
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500